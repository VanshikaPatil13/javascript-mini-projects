<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Blur Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(0, 0, 0);
        }

        .container {
            width: 800px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;

        }

        .card {
            overflow: hidden;
            width: 250px;
            height: 300px;
            cursor: pointer;
            border-radius: 10px;
            transition: 400ms;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .container:hover .card:not(:hover) {
            transform: scale(0.9);
            filter: blur(5px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="image1.jpg" alt="flower image">
        </div>
        <div class="card">
            <img src="image2.jpg" alt="flower image">
        </div>
        <div class="card">
            <img src="image3.jpg" alt="flower image">
        </div>
        <div class="card">
            <img src="image4.jpg" alt="flower image">
        </div>
        <div class="card">
            <img src="image5.jpg" alt="flower image">
        </div>
        <div class="card">
            <img src="image6.jpg" alt="flower image">
        </div>
    </div>
</body>

</html>
