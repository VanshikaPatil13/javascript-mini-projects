<!DOCTYPE html>
<html lang="en">
<head>

<style>
    body{
    }

    .navbar {
    background-color: black;
    text-decoration: none;
    color: aliceblue;
    margin: -7px -8px 0 -7px;
    display: flex;
    justify-content: space-between;
}


    button{
        background-color: rgb(202, 202, 173);
        border: 1px solid rgb(195, 188, 188);

        width: 80px;
        height: 35px;
        cursor: pointer;
        text-align: center;
        padding-top: 5px;
        border-radius: 5px;
        transition: all ease 0.5s;
        margin-bottom: 18px;

    }


#menu {
    background-color: aquamarine;
    list-style-type: none;
    text-align: start;
    cursor: pointer;
}
.home {
    text-decoration: none;
    color: aliceblue;
    cursor: pointer;
    padding: 10px;
    transition: all ease 0.1s;
}
.home:hover {
    transform: scale(1.03);
    color: aquamarine;
}
.news{
    text-decoration: none;
    padding: 10px;
    color:aliceblue;
    cursor: pointer;
}
.news:hover {
    transform: scale(1.03);
    color: aquamarine;
}

.Blog{
    text-decoration: none;
    color: aliceblue;
    cursor: pointer;
    padding: 10px;
}
.Blog:hover {
    transform: scale(1.03);
    color: aquamarine;
}

.about{
    text-decoration: none;
    color: aliceblue;
    cursor: pointer;
    padding: 10px;
}
.about:hover {
    transform: scale(1.03);
    color: aquamarine;
}

.input {
  width:40px;
  height: 35x;
  border: none;
  display: flex;
  gap: 0.2px;
  border-radius: none;
  background-color: rgb(11, 11, 11);
}
.text {
    width: 150px;
    height: 30px;
    cursor: pointer;
    margin-top: 6px;
    border-radius: 7px 0 0 7px;
}
.text:hover {
    transform: scale(1.03);
    background-color: rgb(231, 193, 116);
    border-color: rgb(1, 5, 4);
}

i {
      background-color: rgb(72, 143, 119);
      border-left: none;
      border-radius: 0 5px 5px 0;
      width: 72px;

      color: black;
      text-align: center;
      cursor: pointer;
      padding: 7px;
      margin-top: 8px;
     margin-bottom: -2px;
}
i:hover {
    transform: scale(1.03);
    color: aquamarine;
}
.hero {
    padding-top: 20px;
    margin: -9px;
    height: 200vh;
  background: url("he.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  color: white;
}

</style>

</head>

<body>
    <main>
    <div class="navbar">
        <a href="#Home" class="home" >Home</a>

        <a href="#Blog" class="Blog">Blog</a>
        <a href="#About_Us" class="about">About US</a>
       <div class="input">
         <input class="text" type="search" placeholder="search here....">
            <i class="fa fa-search"></i></input>
       </div>
       <div class="dropdown">
        <button onclick="menu.hidden ^=1">=</button>
        <ul id="menu" hidden>
            <a href="#Home"  ><li>Home</li></a>
            <a href="#About"></a><li>About</li></a>
            <a href="#Contact"></a><li>Contact</li></a>
            <a href="#Blog"></a><li>Blog</li></a>

    </div>

    </section>
