<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="form-container">

        <form id="form" action="" autocomplete="on">
            <label for="name">NAME:</label>
            <input class="input" type="text" id="name" placeholder="Write your name.." autocomplete="name">
            <label for="dob">DOB:</label>
            <input class="input" type="date" id="dob" autocomplete="bday">
            <label for="email">EMAIL ID:</label>
            <input class="input" type="email" id="email" placeholder="abc123@gmail.com" autocomplete="email">
            <label for="role">OCCUPATION:</label>
            <input class="input" type="text" id="role" placeholder="Write your job role..."
                autocomplete="organization-title">
            <label for="file">PROFILE PIC:</label>
            <div class="img-cnt">
                <span>No file chosen</span>
                <input class="input" type="file" id="file">
                <div class="upload">UPLOAD</div>
            </div>
            <small>Only JPG or JPEG files are allowed.</small>
             <input type="submit" class="submit" value="submit">
        </form>
