<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="wrapper">
        <h1>New Year Countdown</h1>

        <div class="container">

            <div class="time"><span id="Days">00</span>
                <p>Days</p>
            </div>
            <div class="time"><span id="Hours">00</span>
                <p>Hours</p>
            </div>
            <div class="time"><span id="Minutes">00</span>
                <p>Minutes</p>
            </div>
            <div class="time"><span id="Seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
